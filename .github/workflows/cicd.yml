name: CICD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to pack without publishing"
        required: false
        type: string

permissions: read-all

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: "Install .NET Core SDK"
        uses: actions/setup-dotnet@v5.2.0
      - name: "Install InvokeBuild Module"
        shell: pwsh
        run: Install-Module -Name InvokeBuild -Force -Scope CurrentUser
      - name: "Resolve Package Version"
        id: package_version
        shell: pwsh
        run: |
          $version = ''

          if ('${{ github.event_name }}' -eq 'release') {
            $version = '${{ github.event.release.tag_name }}'
          }
          elseif ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            'should_pack=false' >> $env:GITHUB_OUTPUT
          }
          else {
            "version=$version" >> $env:GITHUB_OUTPUT
            'should_pack=true' >> $env:GITHUB_OUTPUT
          }
      - name: "Restore"
        shell: pwsh
        run: ./restore.ps1 -Instance ${{ github.run_id }}
      - name: "Format"
        shell: pwsh
        run: ./format.ps1 -Check -Instance ${{ github.run_id }}
      - name: "Build"
        shell: pwsh
        run: ./build.ps1 -Instance ${{ github.run_id }}
      - name: "Test"
        shell: pwsh
        run: ./test.ps1 -Instance ${{ github.run_id }}
      - name: "Pack"
        if: matrix.os == 'windows-latest' && steps.package_version.outputs.should_pack == 'true'
        env:
          PACKAGE_VERSION: ${{ steps.package_version.outputs.version }}
        shell: pwsh
        run: ./pack.ps1 -Version $env:PACKAGE_VERSION -Instance ${{ github.run_id }}
      - name: "Publish Artefacts"
        if: matrix.os == 'windows-latest' && steps.package_version.outputs.should_pack == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: .trash
          path: ".trash"
          include-hidden-files: true

  cd:
    name: CD
    needs: ci
    if: github.event_name == 'release'
    environment:
      name: "NuGet"
      url: https://www.nuget.org/packages/ROFSDB/
    runs-on: windows-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: "Download Artefact"
        uses: actions/download-artifact@v8.0.1
        with:
          name: .trash
          path: ".trash"
      - name: "Install .NET Core SDK"
        uses: actions/setup-dotnet@v5.2.0
      - name: "Install InvokeBuild Module"
        shell: pwsh
        run: Install-Module -Name InvokeBuild -Force -Scope CurrentUser
      - name: "Publish"
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          PACKAGE_VERSION: ${{ github.event.release.tag_name }}
        shell: pwsh
        run: ./publish.ps1 -Version $env:PACKAGE_VERSION -Instance ${{ github.run_id }}
